# fly.toml app configuration file generated for simworld-api on 2026-03-29T23:18:00-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'simworld-api'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine always warm to eliminate cold-start latency for API calls.
  # Shared-CPU 1GB machines are ~$2-3/mo on Fly's free plan tier.
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
